name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.0.1). Required when running manually."
        required: true
        type: string

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & publish to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "metacodex ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            ## metacodex ${{ github.event.inputs.tag || github.ref_name }}

            ### Download
            - **macOS Apple Silicon (M1/M2/M3/M4)** → `metacodex_*_aarch64.dmg`

            > _macOS Intel, Windows and Linux builds are temporarily disabled while we polish them. They will be back soon._

            ### Auto-update
            Already running a previous version? metacodex will check for this release on next launch and show an **Update** pill in the top bar. One click — download, install, relaunch. No reinstall.

            ### macOS signature notice
            These builds are unsigned. After dragging metacodex into `/Applications`, run once in Terminal:

            ```bash
            sudo xattr -cr /Applications/metacodex.app
            ```

            > _Yes, we know — Apple charges $99/year to make this message go away. The day metacodex pays its own credit card, we'll sign it. Until then: terminal._

            Full instructions: [README → macOS signature error](https://github.com/victorbenazzi/metacodex#macos-signature-error-app-is-damaged--cannot-be-opened).
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: "--target aarch64-apple-darwin"
