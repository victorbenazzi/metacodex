name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.0.1). Required when running manually."
        required: true
        type: string

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch_label: aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            arch_label: x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & publish to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "metacodex ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            ## metacodex ${{ github.event.inputs.tag || github.ref_name }}

            Download the `.dmg` matching your Mac architecture below:

            - **Apple Silicon (M1/M2/M3/M4)** → `metacodex_*_aarch64.dmg`
            - **Intel** → `metacodex_*_x64.dmg`

            > ⚠️ **macOS signature notice** — these builds are unsigned. After dragging metacodex into `/Applications`, run once in Terminal:
            > ```bash
            > sudo xattr -cr /Applications/metacodex.app
            > ```
            > Full instructions: [README → macOS signature error](https://github.com/victorbenazzi/metacodex#macos-signature-error-app-is-damaged--cannot-be-opened).
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
