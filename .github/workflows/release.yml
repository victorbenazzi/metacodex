name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.0.1). Required when running manually."
        required: true
        type: string

jobs:
  publish-tauri:
    permissions:
      contents: write
    # Signing turns on automatically once the APPLE_CERTIFICATE secret exists.
    # Until then the build falls back to ad-hoc signing (the previous behavior).
    env:
      SIGN: ${{ secrets.APPLE_CERTIFICATE != '' }}
    strategy:
      # Don't cancel the macOS build if Windows/Linux flakes (and vice-versa).
      # Each platform is independent — a Windows toolchain hiccup shouldn't
      # block shipping the macOS DMG.
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            label: "macOS Apple Silicon (M1+)"
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            label: "macOS Intel"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: "--target x86_64-pc-windows-msvc"
            label: "Windows x64"
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: "--target x86_64-unknown-linux-gnu"
            label: "Linux x64"
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.target }}

      - name: Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Option B signing: import a STABLE self-signed cert into a dedicated
      # keychain and trust it for code signing, so every release shares one code
      # identity. macOS TCC then keeps granted permissions across auto-updates.
      # This does NOT notarize; the Gatekeeper "unidentified developer" warning
      # (and the one-time `xattr -cr`) still applies.
      - name: Set up self-signed signing keychain
        if: ${{ env.SIGN == 'true' && matrix.platform == 'macos-latest' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_P12="$RUNNER_TEMP/metacodex-signing.p12"
          CERT_CRT="$RUNNER_TEMP/metacodex-signing.pem"
          KEYCHAIN="$RUNNER_TEMP/metacodex-signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -hex 20)"

          # The secret is single-line base64 (openssl base64 -A) of the .p12.
          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A -out "$CERT_P12"

          # Dedicated keychain, unlocked and kept unlocked for the whole job.
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | xargs)
          security default-keychain -s "$KEYCHAIN"

          # Import the identity and let codesign use the key non-interactively.
          security import "$CERT_P12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null

          # A self-signed cert isn't chain-trusted, so codesign rejects it as a
          # valid identity until we trust it as a code-signing root. Pull the
          # public cert straight from the keychain (no openssl pkcs12 needed).
          security find-certificate -c "metacodex self-signed" -p "$KEYCHAIN" > "$CERT_CRT"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain "$CERT_CRT"

          echo "Valid code-signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Build & publish to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Empty when the secret is absent => tauri-action falls back to ad-hoc.
          APPLE_SIGNING_IDENTITY: ${{ env.SIGN == 'true' && 'metacodex self-signed' || '' }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "metacodex ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            ## metacodex ${{ github.event.inputs.tag || github.ref_name }}

            ### Download
            - **macOS Apple Silicon (M1/M2/M3/M4)** → `metacodex_*_aarch64.dmg`
            - **macOS Intel** → `metacodex_*_x64.dmg`
            - **Windows x64** → `metacodex_*_x64-setup.exe` (NSIS) or `metacodex_*_x64_en-US.msi` (WiX)
            - **Linux x64** → `metacodex_*_amd64.AppImage` or `metacodex_*_amd64.deb`

            ### Auto-update
            Already running a previous version? metacodex will check for this release on next launch and show an **Update** pill in the top bar. One click — download, install, relaunch. No reinstall.

            ### macOS signature notice
            These builds are signed with a stable self-signed certificate, so macOS keeps the permissions you grant across auto-updates. They are NOT notarized by Apple, so on first install macOS still quarantines them. After dragging metacodex into `/Applications`, run once in Terminal:

            ```bash
            sudo xattr -cr /Applications/metacodex.app
            ```

            > _Notarization (what removes this step entirely) needs Apple's $99/year Developer Program. Until metacodex pays its own bill, it's one terminal command on first install. Your granted permissions now survive updates._

            ### Windows SmartScreen notice
            Windows builds are unsigned. The first launch shows "Windows protected your PC". Click **More info → Run anyway** (one-time). An EV signing cert is on the roadmap.

            Full instructions: [README → installation](https://github.com/victorbenazzi/metacodex#install).
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
